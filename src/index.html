<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goblin Game - Ударь гоблина!</title>
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🃏 Ударь гоблина! 🔨</h1>
            <div class="stats">
                <div class="score">🎯 Очки: <span id="score">0</span></div>
                <div class="misses">💀 Пропуски: <span id="misses">0</span></div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="game-controls">
            <button id="resetButton" class="reset-btn">🔄 Новая игра</button>
        </div>

        <div class="game-over" id="gameOver" style="display: none;">
            <div class="game-over-content">
                <h2>💀 Игра окончена! 💀</h2>
                <p>Ваш счёт: <span id="finalScore">0</span></p>
                <button id="restartButton" class="restart-btn">🎮 Играть снова</button>
            </div>
        </div>
    </div>

    <div class="custom-cursor" id="customCursor"></div>
</body>
</html>
